<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturn - Login</title>

<link rel="icon" href="https://sitetest1-saturn.neocities.org/sicon.png">

<style>
/* STYLE BASE */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial; }

body {
    background: linear-gradient(135deg, #0f0f14, #1a1a2e, #0f0f14);
    color: white;
}

/* HEADER */
header {
    background: rgba(20,20,30,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.banner {
    display: block;
    margin: 0 auto;
    max-width: 380px;
    height: 70px;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 35px;
    padding: 15px;
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-weight: 600;
}

nav a:hover { color:white; }

/* MAIN */
main {
    display:flex;
    justify-content:center;
    align-items:center;
    height: calc(100vh - 150px);
}

/* BOX */
.box {
    background: rgba(30,30,45,0.6);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 16px;
    width: 350px;
    text-align:center;
}

.box h2 {
    margin-bottom: 20px;
    color: #5865f2;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #5865f2;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover { background:#4752c4; }

.link {
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <img src="https://sitetest1-saturn.neocities.org/saturnbanner.png" class="banner">
    <nav>
        <a href="/">Home</a>
        <a href="/games">Games</a>
        <a href="/catalog">Catalog</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </nav>
</header>

<main>
<div class="box">

    <h2>Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="link">
        Don't have an account? <a href="/register" style="color:#5865f2;">Register here</a>
    </div>

</div>
</main>

<script>
let users = JSON.parse(localStorage.getItem("users")) || {};

function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(users[u] && users[u] === p){
        localStorage.setItem("loggedUser", u);
        alert("You're logged in!");
        location.href = "/";
    } else {
        alert("Invalid data");
    }
}
</script>

<script>
if (localStorage.getItem("maintenance") === "true") {
    if (!window.location.pathname.includes("maintenance.html")) {
        window.location.href = "/maintenance.html";
    }
}
</script>

</body>
</html>
